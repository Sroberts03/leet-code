name: Daily LeetCode Goal
on:
  workflow_dispatch:
  schedule:
    - cron: '0 15 * * 1' 

permissions:
  issues: write
  repository-projects: write

jobs:
  create_tasks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        day: [Monday, Tuesday, Wednesday, Thursday, Friday, Saturday]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Issue and Update Project
        env:
          GH_TOKEN: ${{ secrets.PROJECT_PAT }}
          OWNER: "Sroberts03"
        run: |
          # 1. Get the internal Project ID
          PROJECT_ID=$(gh project list --owner "$OWNER" --format json --jq '.projects[] | select(.number==6) | .id')

          # 2. Create the issue
          ISSUE_URL=$(gh issue create \
            --title "LeetCode Practice: ${{ matrix.day }}" \
            --body "Solve 1 LeetCode Medium and push to /solutions")

          # 3. Add to project
          ITEM_ID=$(gh project item-add 6 --owner "$OWNER" --url "$ISSUE_URL" --format json | jq -r '.id')