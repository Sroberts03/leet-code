name: Daily LeetCode Goal
on:
  schedule:
    - cron: '0 15 * * 1' 
  workflow_dispatch:

permissions:
  issues: write
  repository-projects: write

jobs:
  create_tasks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        day: [Monday, Tuesday, Wednesday, Thursday, Friday, Saturday]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create Issue and Update Project
        env:
          GH_TOKEN: ${{ secrets.PROJECT_PAT }}
          OWNER: "Sroberts03"
        run: |
          # 1. Create the issue and get the URL
          ISSUE_URL=$(gh issue create \
            --title "LeetCode Practice: ${{ matrix.day }}" \
            --body "### 🎯 Today's Goal:
            - [ ] Solve 1 LeetCode Medium
            - [ ] Record Time/Space Complexity
            - [ ] Push solution to /solutions folder" \
            --label "documentation")

          echo "Created issue: $ISSUE_URL"

          # 2. Add the issue to project #6 and capture the ITEM_ID
          ITEM_ID=$(gh project item-add 6 --owner "$OWNER" --url "$ISSUE_URL" --format json | jq -r '.id')
          
          echo "Project Item ID: $ITEM_ID"

          # 3. Set your custom fields
          # Using the --project-id flag with string values for fields
          gh project item-edit --id "$ITEM_ID" --project-id 6 --field-id "Priority" --text "Leet Code Practice"
          gh project item-edit --id "$ITEM_ID" --project-id 6 --field-id "Size" --text "S"
          gh project item-edit --id "$ITEM_ID" --project-id 6 --field-id "Start Date" --date "$(date -I)"
          gh project item-edit --id "$ITEM_ID" --project-id 6 --field-id "Due Date" --date "$(date -I)"